# VnExpress crawler: Airflow + Localstack (S3/SQS) + Postgres + Redis
# Run from project root: docker compose up -d

---
x-common-volumes: &common-volumes
  - ./src/dags:/opt/airflow/dags
  - ./src:/opt/airflow/src
  - ./tests:/opt/airflow/tests
  - ./plugins:/opt/airflow/plugins
  - ./config:/opt/airflow/config
  - ./data/model:/opt/airflow/data/model

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: "DPJ4tjZbzYW1XNqMlxSKDj0y04aA8eVb"
    AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
    AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
    AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    AWS_ENDPOINT_URL: "${AWS_ENDPOINT_URL:-http://localstack:4566}"
    PYTHONPATH: /opt/airflow:/opt/airflow/src
    PGPASSWORD: airflow
  volumes: *common-volumes
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
    localstack:
      condition: service_started

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432" # host GUI clients (DBeaver, TablePlus): localhost:5432
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - airflow_network

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - airflow_network

  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: "s3,sqs"
      DEBUG: "0"
      LS_LOG: "warn"
    volumes:
      # Keeps S3/SQS state across container restarts (same pattern as LocalStack docs).
      - localstack-data:/var/lib/localstack
    networks:
      - airflow_network

  # Web UI for S3 / emulated AWS (community LocalStack has no built-in console).
  # Open http://localhost:${LOCALSTACK_UI_PORT:-8088} → S3 or SQS.
  # If lists look empty: recreate this service after env changes, and use the ?endpoint= URL below.
  localstack-ui:
    image: dabolus/localui:0.5.2
    ports:
      - "${LOCALSTACK_UI_PORT:-8088}:8080"
    environment:
      PORT: "8080"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      # LocalUI reads these first; must match the Docker service name (not localhost).
      LOCALUI_S3_SERVICE_ENDPOINT: "http://localstack:4566"
      LOCALUI_SQS_SERVICE_ENDPOINT: "http://localstack:4566"
      LOCALUI_S3_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      LOCALUI_SQS_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      LOCALUI_ENABLED_SERVICES: "s3,sqs"
    depends_on:
      - localstack
    networks:
      - airflow_network

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - airflow_network

  fastapi:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CLICKHOUSE_HOST: "${CLICKHOUSE_HOST:-clickhouse}"
      CLICKHOUSE_PORT: "${CLICKHOUSE_PORT:-8123}"
      AIRFLOW_URL: "${AIRFLOW_URL:-http://airflow-webserver:8080}"
      AIRFLOW_USER: "${AIRFLOW_USER:-admin}"
      AIRFLOW_PASSWORD: "${AIRFLOW_PASSWORD:-admin}"
    depends_on:
      clickhouse:
        condition: service_started
      airflow-webserver:
        condition: service_started
    volumes:
      - ./api:/app/api
    networks:
      - airflow_network

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    hostname: airflow-worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network

  airflow-worker-2:
    <<: *airflow-common
    command: celery worker
    hostname: airflow-worker-2
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network

  airflow-worker-3:
    <<: *airflow-common
    command: celery worker
    hostname: airflow-worker-3
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - airflow_network

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/{logs,dags,plugins,config}
        airflow db init
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
        if [ -n "$${GEMINI_API_KEY:-}" ]; then airflow variables set gemini_api_key "$$GEMINI_API_KEY" || true; fi
        if [ -n "$${GEMINI_MODEL:-}" ]; then airflow variables set gemini_model "$$GEMINI_MODEL" || true; fi
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      PGPASSWORD: airflow
    user: "0:0"
    networks:
      - airflow_network

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    networks:
      - airflow_network

networks:
  airflow_network:
    driver: bridge

volumes:
  postgres-db-volume:
  localstack-data:
